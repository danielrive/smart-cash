apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: container-insights
  namespace: amazon-cloudwatch
spec:
  interval: 10m0s
  chart:
    spec:
      chart: amazon-cloudwatch-observability
      version: 2.1.2
      sourceRef:
        kind: HelmRepository
        name: container-insights
        namespace: flux-system
  values:
    replicaCount: 1
    clusterName: ${CLUSTER_NAME}
    region: ${REGION}
    containerLogs:
      enabled: false